<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeQuestLog AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<link rel="stylesheet" href="codequestlog-ai.css"/>
<!-- Cloudflare Pages will serve this as your homepage on your-project.pages.dev -->
</head>
<body>

<div class="limit-banner" id="limitBanner">
  🎮 You've used all 50 messages for today. Come back tomorrow!
</div>

<div class="header">
  <a href="https://codequestlog.great-site.net" class="back-link" title="Back to CodeQuestLog"><i class="ti ti-arrow-left"></i></a>
  <div class="logo">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 28L9 14L16 21L19 10L22 21L29 14L33 28H5Z" fill="url(#hg)" stroke="#7c3aed" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="5" cy="28" r="2.5" fill="#a78bfa"/>
      <circle cx="19" cy="10" r="2.5" fill="#c4b5fd"/>
      <circle cx="33" cy="28" r="2.5" fill="#a78bfa"/>
      <rect x="5" y="30" width="28" height="3" rx="1.5" fill="#7c3aed"/>
      <defs><linearGradient id="hg" x1="5" y1="10" x2="33" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#5b21b6"/></linearGradient></defs>
    </svg>
    <span class="logo-name">CodeQuestLog <span class="logo-ai">AI</span></span>
  </div>
  <div class="header-right">
    <div class="msg-counter">Messages today: <span id="msgCount">0</span>/50</div>
    <button class="new-btn" id="newBtn"><i class="ti ti-plus"></i> New chat</button>
  </div>
</div>

<div class="main">
  <div class="welcome" id="welcome">
    <div class="welcome-crown">
      <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 28L9 14L16 21L19 10L22 21L29 14L33 28H5Z" fill="url(#wg)" stroke="#7c3aed" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="5" cy="28" r="2.5" fill="#a78bfa"/>
        <circle cx="19" cy="10" r="2.5" fill="#c4b5fd"/>
        <circle cx="33" cy="28" r="2.5" fill="#a78bfa"/>
        <rect x="5" y="30" width="28" height="3" rx="1.5" fill="#7c3aed"/>
        <defs><linearGradient id="wg" x1="5" y1="10" x2="33" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#5b21b6"/></linearGradient></defs>
      </svg>
      <div class="welcome-title">Welcome to <span>CodeQuestLog AI</span></div>
    </div>
    <p class="welcome-sub">Your in-site quest companion. Ask me anything, gamer.</p>
    <div class="chips">
      <button class="chip" onclick="setPrompt('Recommend me a game to play today')"><i class="ti ti-device-gamepad-2"></i> Game ideas</button>
      <button class="chip" onclick="setPrompt('Help me beat a tricky level')"><i class="ti ti-target-arrow"></i> Walkthroughs</button>
      <button class="chip" onclick="setPrompt('Help me with my code')"><i class="ti ti-code"></i> Code</button>
      <button class="chip" onclick="setPrompt('Teach me something new today')"><i class="ti ti-school"></i> Learn</button>
      <button class="chip" onclick="setPrompt('Surprise me with something interesting')"><i class="ti ti-sparkles"></i> Surprise me</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea"></div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea class="input-textarea" id="inputArea" rows="2" placeholder="Message CodeQuestLog AI…"></textarea>
    <div class="input-bottom">
      <div class="input-left">
        <div class="model-badge"><i class="ti ti-sparkles"></i> Gemini 2.0 Flash</div>
      </div>
      <div class="input-right">
        <button class="voice-btn" id="voiceBtn" title="Voice input">
          <i class="ti ti-microphone"></i>
          <div class="voice-waves"><span></span><span></span><span></span><span></span><span></span></div>
        </button>
        <button class="send-btn" id="sendBtn"><i class="ti ti-arrow-up"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="codequestlog-ai.js"></script>
</body>
</html>
